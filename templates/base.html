<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Bootstrap 5 CSS CDN -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <title>{% block title %}RiffMates{% endblock %}</title>
  </head>
  <body class="bg-success-subtle">
    <div class="min-vh-100 d-flex flex-column">
      {% block nav %}
      <nav class="navbar navbar-expand-lg navbar-dark bg-success shadow-sm mb-4">
        <div class="container">
          <a class="navbar-brand fw-bold fs-4 text-white" href="{% url 'home' %}">RiffMates</a>
          <div class="ms-auto">
            <a href="{% url 'news' %}" class="text-white link-underline link-underline-opacity-0 link-underline-opacity-75-hover me-4">
              News
            </a>
            <a href="{% url 'musician_list' %}" class="text-white link-underline link-underline-opacity-0 link-underline-opacity-75-hover me-4">
              Musicians
            </a>
            <a href="{% url 'band_list' %}" class="text-white link-underline link-underline-opacity-0 link-underline-opacity-75-hover me-4">
              Bands
            </a>
            <a href="{% url 'venue_list' %}" class="text-white link-underline link-underline-opacity-0 link-underline-opacity-75-hover">
              Venues
            </a>
          </div>
        </div>
      </nav>
      {% endblock nav %}

      <main class="container flex-grow-1 py-4">
        {% block content %}{% endblock content %}
      </main>

      {% block footer %}
      <footer class="bg-success-subtle text-success text-center py-3 mt-auto border-top border-success">
        &copy; {{ year|default:"2025" }} RiffMates. All rights reserved.
      </footer>
      {% endblock footer %}
    </div>

    <!-- Bootstrap 5 JS (optional, for components that need JS) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
